<!doctype html><meta charset='UTF-8'><title>HTMLコード実行</title><script>let a=new URLSearchParams(location.search).get('html');addEventListener('DOMContentLoaded',()=>{if(a){document.body.style.margin='0';document.body.innerHTML='<iframe id=b style="width:100vw;height:100vh;border:0;display:block" referrerpolicy=no-referrer></iframe>';document.getElementById('b').srcdoc=a}else document.body.innerHTML='<style>body{display:flex;justify-content:center;align-items:center;height:100vh;margin:0;background:#111;color:#fff;font-family:sans-serif}.container{width:80%;max-width:800px}textarea{width:100%;height:300px;box-sizing:border-box;background:#222;color:#fff;border:0;outline:0;padding:10px;font-size:14px;resize:none;border-radius:6px}button{margin-top:15px;padding:12px 20px;font-size:16px;border:0;border-radius:6px;cursor:pointer;background:#0d6efd;color:#fff}button:hover{background:#0b5ed7}</style><div class=container><textarea id=a placeholder=ここにHTMLコードを入力></textarea><button id=b>別タブで開く</button></div>',document.getElementById('b').onclick=()=>open(location.origin+location.pathname+'?html='+encodeURIComponent(document.getElementById('a').value),'_blank')})</script>
